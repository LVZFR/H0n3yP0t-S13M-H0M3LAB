# Cowrie configuration — overrides only (sanitised).
# Full defaults ship in cowrie.cfg.dist inside the package; this file
# only sets the keys that differ. Place at ~/cowrie/etc/cowrie.cfg.

[honeypot]
# Decoy hostname the attacker sees — NOT the real box name.
hostname = srv-web01

[ssh]
# Single dual-stack listener on 2222. An :: socket accepts IPv4 too
# (v4 sources appear in logs as ::ffff:x.x.x.x). Do NOT also add a
# 0.0.0.0 endpoint — the two conflict (Errno 98, address already in use).
# Public port 22 is redirected here by iptables/ip6tables.
listen_endpoints = tcp:2222:interface=\:\:

[output_jsonlog]
# The JSON file the Wazuh agent tails and ships to the manager.
enabled = true
logfile = var/log/cowrie/cowrie.json
